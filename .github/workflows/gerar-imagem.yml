name: Gerar Imagem (Gemini)

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: Prompt da imagem
        required: true
      outfile:
        description: Nome do arquivo (ex. post-comecar.png)
        required: true
        default: imagem.png

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Gerar imagem
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PROMPT: ${{ inputs.prompt }}
          OUTFILE: ${{ inputs.outfile }}
        run: python gerar_imagem.py
      - name: Commit da imagem
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add imagens/
          git commit -m "Imagem gerada: ${{ inputs.outfile }}"
          git push
