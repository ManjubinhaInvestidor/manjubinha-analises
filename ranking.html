<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script>try{ if(window.top===window){ location.replace("https://manjubinhainvestidor.com.br/ranking-de-ativos/"); } }catch(e){}</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Manjubinha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:transparent;color:#222;padding:4px}
.tabs{display:flex;gap:8px;margin-bottom:1rem}
.tab{font-family:'Baloo 2',cursive;padding:7px 24px;border:1.5px solid #ccc;border-radius:999px;background:#fff;font-size:14px;cursor:pointer;color:#666}
.tab.active{background:#23c55e;color:#fff;border-color:#23c55e;font-weight:700}
.filtros{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.9rem}
.fbtn{padding:4px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;font-size:12px;cursor:pointer;color:#777}
.fbtn.on{background:#f6c453;color:#111;border-color:#f6c453;font-weight:700}
.info{font-size:12px;color:#777;margin-bottom:.9rem;line-height:1.5}
.info b{color:#333}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:separate;border-spacing:0 8px;font-size:13.5px;min-width:460px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#d6d6d6;font-weight:700;padding:9px 10px;border:none;background:linear-gradient(135deg,#1e1e1e,#2c2c2c)}
th:first-child{border-radius:10px 0 0 10px}
th:last-child{border-radius:0 10px 10px 0}
th.num{text-align:right}
td{padding:12px 10px;vertical-align:middle;background:linear-gradient(135deg,#171717,#242424);border:none;color:#e8e8e8;border-top:1px solid #333;border-bottom:1px solid #333}
td:first-child{border-radius:14px 0 0 14px;border-left:1px solid #333}
td:last-child{border-radius:0 14px 14px 0;border-right:1px solid #333}
tr:hover td{background:#2a2a2a}
.pos{color:#23c55e;font-weight:800;font-size:13px;width:34px;text-align:center}
.tk{font-weight:700;color:#fff}
.tk a{color:#f6c453;text-decoration:none}
.tk a:hover{text-decoration:underline}
.nm{color:#aaa;font-size:12.5px;font-weight:400}
.bd{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;background:#2f2f2f;color:#ccc;margin-right:4px;white-space:nowrap}
.bd.b2{background:rgba(35,197,94,.18);color:#4ade80}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;color:#f2f2f2}
.dest{display:inline-block;padding:2px 9px;border-radius:10px;font-size:10.5px;background:rgba(246,196,83,.15);color:#f6c453;border:1px solid rgba(246,196,83,.4);white-space:nowrap}
.radar-t{font-family:'Baloo 2',cursive;font-size:14px;font-weight:700;color:#b97a1a;margin:1.4rem 0 .4rem}
.radar-i{font-size:11.5px;color:#888;margin-bottom:.6rem}
.mot{font-size:11px;color:#f6c453}
.foot{font-size:11.5px;color:#999;text-align:right;margin-top:.7rem}
@media(max-width:640px){.hidem{display:none}}
.star-c{width:30px;text-align:center;cursor:pointer;font-size:16px;color:#5a5a5a;-webkit-user-select:none;user-select:none}.star-c.on{color:#f6c453}.star-c:hover{color:#f6c453}.sth{width:30px}.fbtn.wbtn{border-color:#f6c453;color:#f6c453}.fbtn.wbtn.on{background:#f6c453;border-color:#f6c453;color:#171717}.empty-w{text-align:center;color:#999;padding:26px 14px;font-size:13px;line-height:1.6}
</style>
</head>
<body>
<div class="tabs">
<button class="tab active" id="tf" onclick="mostrar('fiis')">FIIs</button>
<button class="tab" id="ta" onclick="mostrar('acoes')">A&ccedil;&otilde;es</button>
</div>
<div class="info">Todos os ativos desta lista atendem aos 4 pilares Manjubinha: <b>perenidade, renda, valoriza&ccedil;&atilde;o e liquidez</b>. A ordem &eacute; definida pela soma das posi&ccedil;&otilde;es em cada pilar, com a liquidez valendo em dobro. A explica&ccedil;&atilde;o completa est&aacute; logo abaixo do ranking.</div>
<div class="filtros" id="filtros"></div>
<div class="tbl-wrap" id="conteudo">Carregando...</div>
<div class="foot" id="foot"></div>
<script>
var D=null,ATIVO='fiis',FILTRO='Todos';
var WATCH=[],WFILTER=false,MJ_SITE='https://manjubinhainvestidor.com.br',MJ_GH='https://manjubinhainvestidor.github.io';
function wKey(t){return String(t||'').toUpperCase()}
function isW(t){return WATCH.indexOf(wKey(t))>-1}
function saveW(){try{localStorage.setItem('mj_watchlist',JSON.stringify(WATCH))}catch(e){}try{if(window.parent&&window.parent!==window){window.parent.postMessage({type:'mjWatchlistSet',tickers:WATCH},MJ_SITE)}}catch(e){}}
function toggleW(t){t=wKey(t);if(!t)return;var i=WATCH.indexOf(t);if(i>-1)WATCH.splice(i,1);else WATCH.push(t);saveW();render()}
function setWatch(){WFILTER=!WFILTER;if(WFILTER)FILTRO='Todos';render()}
function starTd(t){var on=isW(t);return '<td class="star-c'+(on?' on':'')+'" data-tk="'+wKey(t)+'" title="'+(on?'Deixar de acompanhar':'Acompanhar')+'">'+(on?'★':'☆')+'</td>'}
function applyWatch(a){if(Array.isArray(a)){WATCH=a.map(wKey);if(D)render()}}
window.addEventListener('message',function(ev){if(ev.origin!==MJ_SITE&&ev.origin!==MJ_GH)return;var d=ev.data||{};if(d.type==='mjWatchlistData')applyWatch(d.tickers||[])});
document.addEventListener('click',function(e){var td=e.target&&e.target.closest?e.target.closest('.star-c'):null;if(td)toggleW(td.getAttribute('data-tk'))});
try{var _lw=localStorage.getItem('mj_watchlist');if(_lw)WATCH=(JSON.parse(_lw)||[]).map(wKey)}catch(e){}
try{if(window.parent&&window.parent!==window)window.parent.postMessage({type:'mjWatchlistGet'},MJ_SITE)}catch(e){}
function fmtMoeda(v){
if(v==null)return'-';
if(v>=1e9)return'R$ '+(v/1e9).toFixed(1).replace('.',',')+' bi/dia';
if(v>=1e6)return'R$ '+(v/1e6).toFixed(1).replace('.',',')+' mi/dia';
return'R$ '+(v/1e3).toFixed(0)+' mil/dia';
}
function fmtPct(v){return v==null?'-':String(v).replace('.',',')+'%'}
function fmtNum(v){return v==null?'-':String(v).replace('.',',')}
function grupo(a){return (ATIVO==='fiis'?a.tipo:a.setor)||'Outros'}
function mostrar(qual){
ATIVO=qual;FILTRO='Todos';
document.getElementById('tf').className='tab'+(qual==='fiis'?' active':'');
document.getElementById('ta').className='tab'+(qual==='acoes'?' active':'');
render();
}
function setFiltro(f){FILTRO=f;render()}
function render(){
if(!D)return;
var lista=D[ATIVO]||[],fii=ATIVO==='fiis';
var grupos=['Todos'];
lista.forEach(function(a){var g=grupo(a);if(grupos.indexOf(g)<0)grupos.push(g)});
var _nw=lista.filter(function(a){return isW(a.ticker)}).length;document.getElementById('filtros').innerHTML='<button class="fbtn wbtn'+(WFILTER?' on':'')+'" onclick="setWatch()">★ Meus ativos ('+_nw+')</button>'+(WFILTER?'':grupos.map(function(g){
return '<button class="fbtn'+(g===FILTRO?' on':'')+'" onclick="setFiltro(\''+g.replace(/'/g,"\\'")+'\')">'+g+'</button>';
}).join(''));
var h='<table><tr><th class="sth"></th><th></th><th>Ativo</th><th class="hidem"></th>'+
'<th class="num">Liquidez</th><th class="num">DY 12m</th>'+
'<th class="num">'+(fii?'P/VP':'Tag Along')+'</th><th class="hidem"></th></tr>';
for(var i=0;i<lista.length;i++){
var a=lista[i],m=a.metricas||{};
if(FILTRO!=='Todos'&&grupo(a)!==FILTRO)continue;if(WFILTER&&!isW(a.ticker))continue;
var nome=a.post_url?'<a href="'+a.post_url+'" target="_top">'+a.ticker+'</a>':a.ticker;
var badges=fii
?('<span class="bd">'+(a.tipo||'')+'</span>'+(a.segmento?'<span class="bd b2">'+a.segmento+'</span>':''))
:(a.setor?'<span class="bd">'+a.setor+'</span>':'');
var col3=fii?fmtNum(m.p_vp):(m.tag_along!=null?m.tag_along+'%':'-');
h+='<tr>'+starTd(a.ticker)+'<td class="pos">'+(i+1)+'</td>'+
'<td class="tk">'+nome+'<div class="nm">'+(a.nome||'')+'</div></td>'+
'<td class="hidem">'+badges+'</td>'+
'<td class="num">'+fmtMoeda(m.liquidez_diaria)+'</td>'+
'<td class="num">'+fmtPct(m.dy_12m)+'</td>'+
'<td class="num">'+col3+'</td>'+
'<td class="hidem">'+(a.destaque?'<span class="dest">'+a.destaque+'</span>':'')+'</td></tr>';
}
h+='</table>';
var radar=((D.reprovados||{})[ATIVO]||[]).filter(function(r){return r.metricas&&(r.metricas.liquidez_diaria!=null||r.metricas.dy_12m!=null)});
if(!WFILTER&&radar.length){
h+='<div class="radar-t">&#128064; Vale observar</div><div class="radar-i">Ativos no radar do Manjubinha que hoje n&atilde;o atendem a todos os pilares. O motivo aparece ao lado.</div>';
h+='<table><tr><th class="sth"></th><th></th><th>Ativo</th><th class="num">Liquidez</th><th class="num">DY 12m</th><th class="num">'+(fii?'P/VP':'Tag Along')+'</th><th>Motivo</th></tr>';
for(var k=0;k<radar.length;k++){
var r=radar[k],rm=r.metricas||{};
var rn=r.post_url?'<a href="'+r.post_url+'" target="_top">'+r.ticker+'</a>':r.ticker;
var rc3=fii?fmtNum(rm.p_vp):(rm.tag_along!=null?rm.tag_along+'%':'-');
h+='<tr>'+starTd(r.ticker)+'<td class="pos">'+(lista.length+k+1)+'</td><td class="tk">'+rn+'<div class="nm">'+(r.nome||'')+'</div></td>'+
'<td class="num">'+fmtMoeda(rm.liquidez_diaria)+'</td>'+
'<td class="num">'+fmtPct(rm.dy_12m)+'</td>'+
'<td class="num">'+rc3+'</td>'+
'<td class="mot">'+(r.motivo_exclusao||'')+'</td></tr>';
}
h+='</table>';
}
if(WFILTER&&!lista.some(function(a){return isW(a.ticker)})){h='<div class="empty-w">Você ainda não segue nenhum ativo. Toque na estrela para acompanhar por aqui.</div>';}document.getElementById('conteudo').innerHTML=h;
document.getElementById('foot').textContent='Atualizado em '+(D.ultima_atualizacao||'');
setTimeout(function(){try{window.parent.postMessage({type:'rankingHeight',height:document.body.scrollHeight},'*')}catch(e){}},150);
}
fetch('ranking.json?v='+Date.now()).then(function(r){return r.json()}).then(function(j){D=j;render()})
.catch(function(){document.getElementById('conteudo').textContent='Nao foi possivel carregar o ranking.'});
</script>
</body>
</html>
